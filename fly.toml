app = "davvn-aim"
primary_region = "iad"

[build]

[env]
  PORT = "3001"
  # Set to the production frontend origin (e.g. "https://davvn.com") via
  # `fly secrets set CORS_ORIGIN=...` or by editing this value before deploy.
  CORS_ORIGIN = "https://yourdomain.com"
  # DB lives on the mounted volume so it survives redeploys.
  DB_PATH = "/app/data/aim.db"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "aim_data"
  destination = "/app/data"
